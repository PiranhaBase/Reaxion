<!DOCTYPE html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Minimal, user-friendly chemistry tool to balance equations instantly, featuring a built-in reaction library and clear documentation.">
        <title>Reaxion - Balance Reactions</title>
        <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.svg">
        <link rel="preload" href="./assets/fonts/Manrope.woff2" as="font" type="font/woff2" crossorigin>
        <link rel="preload" href="./assets/fonts/JetBrains_Mono.woff2" as="font" type="font/woff2" crossorigin>
        <link rel="stylesheet" href="./src/ui/styles/style.css">
        <script src="./src/ui/theme.js"></script>
        <script defer type="module" src="./src/app.js"></script>
    </head>
    <body>
        <nav-bar title="Reaxion">
            <nav-link active view="home-view">Home</nav-link>
            <nav-link view="example-view">Examples</nav-link>
            <nav-link view="documentation-view">Documentation</nav-link>
        </nav-bar>
        <view-router>
            <home-view>
                <span class="subtitle">BALANCE REACTIONS</span>
                <hgroup>
                    <h1>Reaction Balancer</h1>
                    <p>Input your unbalanced chemical equation below.</p>
                </hgroup>
            </home-view>
            <example-view>
                <span class="subtitle">EXPLORE LIBRARY</span>
                <hgroup>
                    <h1>Examples</h1>
                    <p>Click on a reaction to balance.</p>
                </hgroup>
            </example-view>
            <documentation-view>
                <span class="subtitle">READ THE DOCUMENTATION</span>
                <hgroup>
                    <h1>Documentation</h1>
                    <p>Comprehensive documentation for the application.</p>
                </hgroup>
            </documentation-view>
        </view-router>
    </body>
</html>
